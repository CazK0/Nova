<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: rgba(10, 10, 14, 0.93);
      --border: rgba(255, 255, 255, 0.07);
      --accent: #00f5a0;
      --accent2: #00d9f5;
      --text: #e8e8f0;
      --muted: rgba(232, 232, 240, 0.4);
      --radius: 12px;
    }

    html, body {
      width: 440px;
      height: 760px;
      overflow: hidden;
      background: transparent;
      font-family: 'JetBrains Mono', monospace;
      -webkit-app-region: drag;
      user-select: none;
    }

    .shell {
      width: 100%;
      height: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .titlebar-right { display: flex; align-items: center; gap: 8px; }

    .corner-btns { display: flex; gap: 4px; }

    .corner-btn {
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: var(--muted);
      transition: all 0.15s;
      -webkit-app-region: no-drag;
    }

    .corner-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.error { background: #ff4d6d; box-shadow: 0 0 8px #ff4d6d; }
    .status-dot.thinking { background: #f5c400; box-shadow: 0 0 8px #f5c400; }

    .close-btn {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255,75,75,0.6);
      border: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 0.15s;
    }

    .close-btn:hover { background: #ff4d4d; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 14px;
      overflow-y: auto;
      -webkit-app-region: no-drag;
    }

    .phase-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 100px;
      align-self: flex-start;
    }

    .block {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .block-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .block-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-text { font-size: 11px; color: var(--text); }
    .status-text.ok { color: var(--accent); }
    .status-text.err { color: #ff4d6d; }

    .opacity-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .opacity-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    .opacity-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .opacity-val {
      font-size: 10px;
      color: var(--muted);
      width: 30px;
      text-align: right;
    }

    .btn-row { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 9px;
      background: linear-gradient(135deg, rgba(0,245,160,0.12), rgba(0,217,245,0.08));
      border: 1px solid rgba(0,245,160,0.25);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(0,245,160,0.2), rgba(0,217,245,0.14));
      border-color: rgba(0,245,160,0.5);
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn.secondary {
      background: rgba(255,255,255,0.04);
      border-color: var(--border);
      color: var(--muted);
    }

    .btn.secondary:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    .btn.analyze {
      background: linear-gradient(135deg, rgba(0,217,245,0.15), rgba(0,245,160,0.08));
      border-color: rgba(0,217,245,0.35);
      color: var(--accent2);
      flex: none;
      width: 100%;
      padding: 11px;
      font-size: 11px;
    }

    .btn.analyze:hover {
      background: linear-gradient(135deg, rgba(0,217,245,0.25), rgba(0,245,160,0.14));
      border-color: rgba(0,217,245,0.6);
    }

    .region-info {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .region-info.set { color: var(--accent); }

    .preview-box {
      width: 100%;
      aspect-ratio: 16/9;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .preview-box img { width: 100%; height: 100%; object-fit: contain; }

    .preview-empty {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .copy-btn {
      font-size: 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .copy-btn:hover { color: var(--accent); border-color: rgba(0,245,160,0.3); }
    .copy-btn.copied { color: var(--accent); border-color: rgba(0,245,160,0.4); }

    .response-box {
      width: 100%;
      min-height: 140px;
      max-height: 240px;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.7;
      color: var(--text);
      word-break: break-word;
      user-select: text;
      -webkit-app-region: no-drag;
    }

    .response-box.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .response-box pre {
      margin: 6px 0;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 10.5px;
    }

    .response-box code:not(pre code) {
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10.5px;
    }

    .response-box p { margin: 4px 0; white-space: pre-wrap; }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 12px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .hint {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
      line-height: 1.7;
    }

    .hint kbd {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="titlebar">
      <span class="brand">Nova</span>
      <div class="titlebar-right">
        <div class="corner-btns">
          <button class="corner-btn" onclick="snapCorner('tl')" title="Top Left">↖</button>
          <button class="corner-btn" onclick="snapCorner('tr')" title="Top Right">↗</button>
          <button class="corner-btn" onclick="snapCorner('bl')" title="Bottom Left">↙</button>
          <button class="corner-btn" onclick="snapCorner('br')" title="Bottom Right">↘</button>
        </div>
        <div class="status-dot" id="dot"></div>
        <button class="close-btn" onclick="ipcRenderer.send('close-window')"></button>
      </div>
    </div>

    <div class="body">
      <span class="phase-badge">Phase 4 — UX</span>

      <div class="block">
        <div class="block-row">
          <span class="block-label">Backend</span>
          <span class="status-text" id="status">Checking...</span>
        </div>
        <div class="opacity-row">
          <span class="block-label">Opacity</span>
          <input type="range" min="20" max="100" value="93" id="opacitySlider" oninput="setOpacity(this.value)" />
          <span class="opacity-val" id="opacityVal">93%</span>
        </div>
      </div>

      <div class="block">
        <div class="block-row">
          <span class="block-label">Capture</span>
          <span class="region-info" id="regionInfo">No region set</span>
        </div>
        <div class="btn-row">
          <button class="btn" onclick="openSelector()">Draw Region</button>
          <button class="btn secondary" onclick="captureRegion()" id="captureBtn" disabled>Capture</button>
          <button class="btn secondary" onclick="captureFullscreen()">Fullscreen</button>
        </div>
      </div>

      <div class="preview-box">
        <span class="preview-empty" id="previewEmpty">No capture yet</span>
        <img id="preview" style="display:none" />
      </div>

      <button class="btn analyze" id="analyzeBtn" onclick="analyze()" disabled>Analyze with Gemini</button>

      <div>
        <div class="response-header">
          <span class="block-label">Response</span>
          <button class="copy-btn" id="copyBtn" onclick="copyResponse()">Copy</button>
        </div>
      </div>

      <div class="response-box empty" id="responseBox">Waiting for capture...</div>

      <p class="hint">
        <kbd>Ctrl+Shift+S</kbd> snap &amp; analyze &nbsp;·&nbsp;
        <kbd>Ctrl+Shift+R</kbd> draw region &nbsp;·&nbsp;
        <kbd>Ctrl+Shift+H</kbd> toggle
      </p>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require("electron");

    let lastImageB64 = null;
    let lastResponseText = "";
    let selectedRegion = null;

    async function checkHealth() {
      const status = document.getElementById("status");
      const dot = document.getElementById("dot");
      try {
        const res = await fetch("http://127.0.0.1:8000/health");
        const data = await res.json();
        status.textContent = `${data.status} — ${data.message}`;
        status.className = "status-text ok";
        dot.className = "status-dot";
      } catch {
        status.textContent = "unreachable";
        status.className = "status-text err";
        dot.className = "status-dot error";
      }
    }

    function showPreview(blob) {
      const reader = new FileReader();
      reader.onload = () => {
        lastImageB64 = reader.result.split(",")[1];
        const img = document.getElementById("preview");
        img.src = reader.result;
        img.style.display = "block";
        document.getElementById("previewEmpty").style.display = "none";
        document.getElementById("analyzeBtn").disabled = false;
        setResponseText("Ready to analyze.");
      };
      reader.readAsDataURL(blob);
    }

    function setResponseText(text) {
      const box = document.getElementById("responseBox");
      box.className = "response-box";
      box.textContent = text;
    }

    function renderMarkdown(text) {
      const box = document.getElementById("responseBox");
      box.className = "response-box";
      let html = "";
      const lines = text.split("\n");
      let inCode = false;
      let codeLang = "";
      let codeLines = [];

      for (const line of lines) {
        if (line.startsWith("```")) {
          if (!inCode) {
            inCode = true;
            codeLang = line.slice(3).trim() || "plaintext";
            codeLines = [];
          } else {
            inCode = false;
            const code = codeLines.join("\n");
            const highlighted = hljs.highlight(code, { language: codeLang, ignoreIllegals: true }).value;
            html += `<pre><code class="hljs language-${codeLang}">${highlighted}</code></pre>`;
            codeLines = [];
          }
        } else if (inCode) {
          codeLines.push(line);
        } else {
          const escaped = line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
          const inlined = escaped.replace(/`([^`]+)`/g, "<code>$1</code>");
          html += `<p>${inlined}</p>`;
        }
      }

      box.innerHTML = html;
      box.scrollTop = box.scrollHeight;
    }

    function openSelector() {
      ipcRenderer.send("open-selector");
    }

    async function captureRegion() {
      if (!selectedRegion) return;
      try {
        const res = await fetch("http://127.0.0.1:8000/screenshot", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(selectedRegion),
        });
        showPreview(await res.blob());
      } catch {
        document.getElementById("status").textContent = "Capture failed";
        document.getElementById("status").className = "status-text err";
      }
    }

    async function captureFullscreen() {
      try {
        const res = await fetch("http://127.0.0.1:8000/screenshot/fullscreen");
        showPreview(await res.blob());
      } catch {
        document.getElementById("status").textContent = "Capture failed";
        document.getElementById("status").className = "status-text err";
      }
    }

    async function analyze() {
      if (!lastImageB64) return;
      const box = document.getElementById("responseBox");
      const btn = document.getElementById("analyzeBtn");
      const dot = document.getElementById("dot");

      box.className = "response-box";
      box.innerHTML = '<span class="cursor"></span>';
      btn.disabled = true;
      dot.className = "status-dot thinking";
      lastResponseText = "";

      try {
        const res = await fetch("http://127.0.0.1:8000/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image_b64: lastImageB64 }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          lastResponseText += decoder.decode(value, { stream: true });
          box.innerHTML = lastResponseText + '<span class="cursor"></span>';
          box.scrollTop = box.scrollHeight;
        }

        renderMarkdown(lastResponseText);
        dot.className = "status-dot";
      } catch {
        box.textContent = "Analysis failed. Check your API key in .env";
        dot.className = "status-dot error";
      }

      btn.disabled = false;
    }

    function copyResponse() {
      if (!lastResponseText) return;
      navigator.clipboard.writeText(lastResponseText);
      const btn = document.getElementById("copyBtn");
      btn.textContent = "Copied!";
      btn.className = "copy-btn copied";
      setTimeout(() => {
        btn.textContent = "Copy";
        btn.className = "copy-btn";
      }, 1500);
    }

    function snapCorner(corner) {
      ipcRenderer.send("snap-corner", corner);
    }

    function setOpacity(val) {
      document.getElementById("opacityVal").textContent = val + "%";
      ipcRenderer.send("set-opacity", val / 100);
    }

    ipcRenderer.on("region-selected", (e, region) => {
      selectedRegion = region;
      document.getElementById("regionInfo").textContent = `${region.width} × ${region.height}`;
      document.getElementById("regionInfo").className = "region-info set";
      document.getElementById("captureBtn").disabled = false;
      captureRegion();
    });

    ipcRenderer.on("snap-and-analyze", async () => {
      await captureFullscreen();
      setTimeout(analyze, 400);
    });

    checkHealth();
    setInterval(checkHealth, 10000);
  </script>
</body>
</html>
